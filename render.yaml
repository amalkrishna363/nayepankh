databases:
  - name: nayapankh-db
    databaseName: nayapankh
    user: nayapankh_user
    plan: free

services:
  - type: web
    name: nayapankh-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nayapankh-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://nayapankh-frontend.onrender.com

  - type: web
    name: nayapankh-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: API_KEY
        value: vms_live_demo0000
      - key: API_URL
        value: https://nayapankh-backend.onrender.com
